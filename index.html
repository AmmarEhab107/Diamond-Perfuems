<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2DDNTPC0KP"></script>
<script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamonds Perfumes | متجر العطور الفاخرة</title>
    <meta name="description" content="عطور فاخرة بجودة ملكية، تغليف أنيق، وشحن لجميع محافظات مصر.">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg-color: #090909; --gold: #C7A34B; --white: #FFFFFF; --dark-gray: #151515; --font-heading: 'Tajawal', sans-serif; --font-body: 'Cairo', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--white); font-family: var(--font-body); overflow-x: hidden; }
        .magic-logo { filter: invert(1) grayscale(100%) contrast(150%); mix-blend-mode: screen; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 1s ease, visibility 1s; }
        .loader-logo img { width: 150px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.5; transform: scale(0.9); } }
        .top-bar { background-color: var(--gold); color: var(--bg-color); text-align: center; padding: 10px; font-size: 0.95rem; font-weight: 700; font-family: var(--font-heading); }
        h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 700; }
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 2rem; color: var(--gold); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 30px; font-weight: 600; font-family: var(--font-heading); font-size: 1.1rem; text-decoration: none; transition: 0.4s; border-radius: 4px; cursor: pointer; }
        .btn-gold { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
        .btn-gold:hover { background: var(--gold); color: var(--bg-color); box-shadow: 0 0 15px rgba(199, 163, 75, 0.4); }
        .btn-white { background: transparent; color: var(--white); border: 1px solid var(--white); }
        .btn-white:hover { background: var(--white); color: var(--bg-color); }
        nav { position: sticky; top: 0; width: 100%; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(9, 9, 9, 0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(199, 163, 75, 0.1); }
        .nav-logo img { height: 50px; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--white); text-decoration: none; font-size: 1.1rem; font-family: var(--font-heading); transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .cart-icon { font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .hero { height: calc(100vh - 40px); display: flex; align-items: center; justify-content: center; position: relative; text-align: center; padding: 0 5%; background-color: var(--bg-color); }
        .hero-content { z-index: 2; max-width: 800px; }
        .hero h1 { font-size: 4rem; margin-bottom: 20px; color: var(--white); }
        .hero p { font-size: 1.3rem; color: #aaa; margin-bottom: 40px; }
        .shop-section { padding: 80px 5%; background: var(--dark-gray); border-top: 1px solid #1a1a1a; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: var(--bg-color); border: 1px solid #1a1a1a; border-radius: 12px; padding: 25px; text-align: center; transition: 0.4s; }
        .product-card img { width: 100%; height: 300px; object-fit: contain; margin-bottom: 20px; }
        .product-card h3 { font-size: 1.8rem; margin-bottom: 10px; }
        .product-card .price { font-size: 1.4rem; color: var(--gold); font-weight: bold; margin-bottom: 15px; }
        .cart-sidebar { position: fixed; top: 0; left: -100%; width: 350px; height: 100vh; background: var(--dark-gray); z-index: 2000; padding: 30px; transition: 0.4s; border-right: 1px solid #333; }
        .cart-sidebar.active { left: 0; }
        .floating-wa { position: fixed; bottom: 30px; left: 30px; background-color: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; z-index: 1500; }
        .fade-in { opacity: 0; transform: translateY(30px); transition: 0.8s ease; }
        .fade-in.appear { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-logo"><img src="image_2.png" alt="Logo" class="magic-logo"></div></div>
    <div class="top-bar">شحن مجاني لفترة محدودة - اطلب عطرك المفضل الآن!</div>

    <nav>
        <div class="nav-logo"><img src="image_2.png" alt="Logo" class="magic-logo"></div>
        <ul class="nav-links">
            <li><a href="#home">الرئيسية</a></li>
            <li><a href="#consult">الاستشارة</a></li>
            <li><a href="#shop">المجموعة الماسية</a></li>
            <li><a href="#reviews">الآراء</a></li>
            <li><a href="#faq">الأسئلة</a></li>
        </ul>
        <div class="nav-left"><i class="fas fa-shopping-bag cart-icon" id="open-cart"></i></div>
    </nav>

    <!-- الهيرو والاستشارة كما هما في كودك -->
    <section id="home" class="hero"><div class="hero-content fade-in"><h1>أهلاً بك في عالم التألق.</h1><p>اكتشف مجموعتنا الحصرية من العطور الفاخرة.</p><a href="#shop" class="btn btn-gold">اكتشف عروضنا</a></div></section>

    <section id="shop" class="shop-section">
        <h2 class="section-title fade-in">المجموعة الماسية</h2>
        <div id="shop-container" class="product-grid"></div>
    </section>

    <!-- المميزات، الآراء، والأسئلة (ضعها هنا من كودك القديم كما هي) -->

    <div class="cart-sidebar" id="cart-sidebar">
        <i class="fas fa-times close-cart" id="close-cart"></i>
        <h2>سلة المشتريات</h2>
        <div id="cart-items" style="margin: 20px 0;"></div>
        <button onclick="checkout()" class="btn btn-gold" style="width: 100%;">إتمام الطلب عبر واتساب</button>
    </div>

    <a href="https://wa.me/201055310466" class="floating-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        let cart = [];
        const apiUrl = 'https://sheetdb.io/api/v1/gazn7tynl1f8b';

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('shop-container');
                data.forEach(item => {
                    const cleanImg = item.Image.replace(/<[^>]*>/g, '').replace(/"/g, '');
                    container.innerHTML += `
                        <div class="product-card fade-in appear">
                            <img src="${cleanImg}" alt="${item.Name}">
                            <h3>${item.Name}</h3>
                            <p class="price">${item.Price} جنيه</p>
                            <button class="btn btn-gold" style="width:100%" onclick="addToCart('${item.Name}', '${item.Price}')">إضافة للسلة</button>
                        </div>
                    `;
                });
            });

        function addToCart(name, price) {
            cart.push({ name, price });
            document.getElementById('cart-items').innerHTML += `<p>${name} - ${price} جنيه</p>`;
            alert(name + " أضيف للسلة!");
        }

        function checkout() {
            let msg = "مرحباً، أريد طلب:%0A";
            cart.forEach(i => msg += `- ${i.name} (${i.price} ج)%0A`);
            window.open(`https://wa.me/201055310466?text=${msg}`, '_blank');
        }

        // الأكواد الأصلية للـ Loader والـ FAQ والـ Scroll
        document.addEventListener("DOMContentLoaded", function() { setTimeout(() => { document.getElementById('loader').style.opacity = '0'; }, 1000); });
        document.getElementById('open-cart').addEventListener('click', () => document.getElementById('cart-sidebar').classList.add('active'));
        document.getElementById('close-cart').addEventListener('click', () => document.getElementById('cart-sidebar').classList.remove('active'));
    </script>
</body>
</html>
