<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2DDNTPC0KP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-2DDNTPC0KP');
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamonds Perfumes | متجر العطور الفاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #090909; --gold: #C7A34B; --white: #FFFFFF; --dark-gray: #151515; --font-heading: 'Tajawal', sans-serif; --font-body: 'Cairo', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--white); font-family: var(--font-body); overflow-x: hidden; }
        .magic-logo { filter: invert(1) grayscale(100%) contrast(150%); mix-blend-mode: screen; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 1s ease, visibility 1s; }
        .top-bar { background-color: var(--gold); color: var(--bg-color); text-align: center; padding: 10px; font-weight: 700; font-family: var(--font-heading); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 30px; font-weight: 600; font-family: var(--font-heading); font-size: 1.1rem; text-decoration: none; transition: 0.4s; border-radius: 4px; cursor: pointer; }
        .btn-gold { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
        .btn-gold:hover { background: var(--gold); color: var(--bg-color); box-shadow: 0 0 15px rgba(199, 163, 75, 0.4); }
        nav { position: sticky; top: 0; width: 100%; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(9, 9, 9, 0.9); backdrop-filter: blur(10px); z-index: 1000; }
        .shop-section { padding: 80px 5%; background: var(--dark-gray); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: var(--bg-color); border: 1px solid #1a1a1a; padding: 25px; text-align: center; border-radius: 12px; }
        .cart-sidebar { position: fixed; top: 0; left: -100%; width: 350px; height: 100vh; background: var(--dark-gray); z-index: 2000; padding: 30px; transition: 0.4s; border-right: 1px solid #333; }
        .cart-sidebar.active { left: 0; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-logo"><img src="image_2.png" class="magic-logo" style="width:150px;"></div></div>
    <div class="top-bar">شحن مجاني لفترة محدودة - اطلب عطرك المفضل الآن!</div>

    <nav>
        <div class="nav-logo"><img src="image_2.png" class="magic-logo" style="height:50px;"></div>
        <i class="fas fa-shopping-bag" id="open-cart" style="cursor:pointer; font-size:1.3rem;"></i>
    </nav>

    <!-- (بقية الأقسام: الهيرو، الاستشارة، المميزات، الآراء، الأسئلة، الفوتر - كما هي في كودك الأصلي) -->
    <section id="shop" class="shop-section">
        <h2 class="section-title">المجموعة الماسية</h2>
        <div id="shop-container" class="product-grid"></div>
    </section>

    <!-- المودال الخاص بالبيانات -->
    <div id="checkout-modal" class="modal-overlay">
        <div style="background:#151515; padding:30px; width:90%; max-width:400px; border-radius:10px; text-align:center;">
            <h2 style="color:var(--gold);">بيانات الطلب</h2>
            <p id="total-price" style="margin:15px 0; font-size:1.2rem;"></p>
            <input type="text" id="cust-name" placeholder="الاسم" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="text" id="cust-phone" placeholder="رقم التليفون" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="text" id="cust-address" placeholder="العنوان" style="width:100%; padding:10px; margin-bottom:10px;">
            <button onclick="sendOrder()" class="btn btn-gold" style="width:100%;">تأكيد الطلب</button>
            <button onclick="document.getElementById('checkout-modal').style.display='none'" style="background:none; border:none; color:white; margin-top:10px; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <i class="fas fa-times" id="close-cart" style="cursor:pointer; font-size:24px;"></i>
        <h2>سلة المشتريات</h2>
        <div id="cart-items" style="margin: 20px 0;"></div>
        <button onclick="openCheckout()" class="btn btn-gold" style="width:100%;">إتمام الطلب</button>
    </div>

    <script>
        let cart = [];
        const apiUrl = 'https://sheetdb.io/api/v1/gazn7tynl1f8b';
        fetch(apiUrl).then(res => res.json()).then(data => {
            const container = document.getElementById('shop-container');
            data.forEach(item => {
                const cleanImg = item.Image.replace(/<[^>]*>/g, '').replace(/"/g, '');
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${cleanImg}" alt="${item.Name}" style="width:100%; height:200px; object-fit:contain;">
                        <h3>${item.Name}</h3>
                        <p>${item.Price} جنيه</p>
                        <button class="btn-gold" onclick="addToCart('${item.Name}', ${item.Price})">إضافة للسلة</button>
                    </div>
                `;
            });
        });

        function addToCart(name, price) {
            cart.push({ name, price });
            document.getElementById('cart-items').innerHTML += `<p style="border-bottom:1px solid #333;">${name} - ${price} جنيه</p>`;
            alert("تمت الإضافة!");
        }

        function openCheckout() {
            let total = cart.reduce((sum, item) => sum + parseFloat(item.price), 0);
            document.getElementById('total-price').innerText = "الإجمالي: " + total + " جنيه";
            document.getElementById('checkout-modal').style.display = 'flex';
        }

        function sendOrder() {
            let name = document.getElementById('cust-name').value;
            let phone = document.getElementById('cust-phone').value;
            let addr = document.getElementById('cust-address').value;
            if(!name || !phone || !addr) { alert("من فضلك أكمل البيانات"); return; }
            let msg = `طلب جديد:%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالعنوان: ${addr}%0A%0Aالطلبات:%0A`;
            cart.forEach(i => msg += `- ${i.name} (${i.price} ج)%0A`);
            window.open(`https://wa.me/201055310466?text=${msg}`, '_blank');
        }

        document.getElementById('open-cart').addEventListener('click', () => document.getElementById('cart-sidebar').classList.add('active'));
        document.getElementById('close-cart').addEventListener('click', () => document.getElementById('cart-sidebar').classList.remove('active'));
        window.onload = () => document.getElementById('loader').style.display = 'none';
    </script>
</body>
</html>
